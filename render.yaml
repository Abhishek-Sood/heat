# Render Blueprint - Deploy full stack application
# https://render.com/docs/blueprint-spec

databases:
  - name: heat-postgres
    databaseName: heat
    user: heat_user
    plan: free
    region: oregon

services:
  # Backend API Service (includes MCP server)
  - type: web
    name: heat-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: heat-postgres
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: heat-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: heat-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: heat-postgres
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: heat-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: heat-postgres
          property: port
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Set manually in Render dashboard
      - key: MCP_SERVER_HOST
        value: "127.0.0.1"
      - key: MCP_SERVER_PORT
        value: "9000"
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CHROMA_DB_PATH
        value: "/app/chroma_data"
      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"
      - key: API_PREFIX
        value: "/api"
      - key: PROJECT_NAME
        value: "GenAI Clinical Assistant"
      - key: VERSION
        value: "1.0.0"
      - key: SKIP_MCP_CHECK
        value: "true"
      - key: FRONTEND_URL
        sync: false  # Set manually: https://heat-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: heat-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set manually: heat-backend.onrender.com
